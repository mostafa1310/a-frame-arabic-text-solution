<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Arabic A-Frame Text Solution Test</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <!-- Load the bundled smart text library -->
  <script src="aframe-smart-text.js"></script>
  <script>
    // Initialize the smart text system after A-Frame
    window.onload = () => {
      SmartText.initSmartTextSystem();
    };
  </script>
</head>
<body>
  <a-scene>
    <!-- Add some smart text elements -->
    <a-entity smart-text="value: مرحبا بالعالم; lang: ar; color: #ff0055; size: 3; align: center;" position="0 2 -3"></a-entity>
    
    <a-entity smart-text="value: Hello World; lang: en; color: #00ffcc; size: 2; align: center;" position="0 0.5 -3"></a-entity>

    <a-camera position="0 1.6 0"></a-camera>
    <a-sky color="#111"></a-sky>
  </a-scene>
</body>
</html>
