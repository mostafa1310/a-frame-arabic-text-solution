<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Arabic A-Frame Text Solution Test</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <!-- Load the bundled smart text library -->
  <script src="aframe-smart-text.js"></script>
  <script>
    // Initialize the smart text system after A-Frame
    window.onload = () => {
      SmartText.initSmartTextSystem();
    };
  </script>
</head>
<body>
  <a-scene>
    <!-- Add some smart text elements -->
    <!-- 3D Arabic with Glow -->
    <a-entity smart-text="value: مرحبا بالعالم; lang: ar; color: #ff0055; size: 2.5; align: center; depth: 0.15; glow: true; weight: 0.2;" position="0 2.5 -4"></a-entity>
    
    <!-- 3D English Text -->
    <a-entity smart-text="value: 3D ARABIC XR; lang: en; color: #00ffcc; size: 1.5; align: center; depth: 0.1; weight: 0.1;" position="0 1 -4"></a-entity>

    <a-camera position="0 1.6 0"></a-camera>
    <a-sky color="#050505"></a-sky>
  </a-scene>
</body>
</html>
